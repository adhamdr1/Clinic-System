services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: clinic_sql_new
    ports:
      - "${SQL_PORT}:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_PASSWORD}
      - MSSQL_PID=Developer
    volumes:
      - sql_data_new:/var/opt/mssql

  redis:
    image: redis:latest
    container_name: elite_clinic_redis
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  sql_data_new: